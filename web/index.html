<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>多端互通</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="sidebar">
  <div id="self-name">…</div>
  <div id="self-pin"></div>
  <div id="self-actions">
    <button id="qr-btn" hidden>📱 手机接入</button>
    <button id="quit-btn" hidden>⏻ 停止服务</button>
  </div>
  <div id="peer-list"></div>
</div>
<div id="main">
  <div id="chat-header">选择左侧设备开始传输</div>
  <div id="messages"></div>
  <div id="composer" hidden>
    <button id="file-btn" title="发送文件">📎</button>
    <input id="file-input" type="file" multiple hidden>
    <textarea id="text-input" rows="2" placeholder="输入消息，Enter 发送；拖文件到聊天区可直接发送"></textarea>
    <button id="send-btn">发送</button>
  </div>
</div>
<div id="qr-modal" hidden>
  <div id="qr-box">
    <h3>手机扫码接入</h3>
    <div id="qr-img"></div>
    <select id="qr-ip" hidden></select>
    <div id="qr-url"></div>
    <div id="qr-hint">用手机相机/浏览器扫码；需与本机在同一 Wi-Fi。扫码后填设备名即可连接。</div>
    <button id="qr-close">关闭</button>
  </div>
</div>
<div id="login" hidden>
  <div id="login-box">
    <h2>连接到电脑</h2>
    <input id="login-name" placeholder="给这台设备起个名字（如 iPhone）" maxlength="20">
    <input id="login-pin" placeholder="电脑屏幕上的 6 位 PIN" inputmode="numeric" maxlength="6">
    <button id="login-btn">连接</button>
    <div id="login-err"></div>
  </div>
</div>
<script src="qrcode.js"></script>
<script src="app.js"></script>
</body>
</html>
